apiVersion: v1
kind: Secret
metadata:
  name: milvus-auth
  namespace: demo
stringData:
  password: thisIs1StrongPassword
  username: root
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: milvus-config
  namespace: demo
stringData:
  milvus.cnf: |
    [mysqld]
    max_connections = 200
    read_buffer_size = 1048576
type: Opaque
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: milvus-ca
  namespace: demo
spec:
  ca:
    secretName: milvus-ca
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/instance: milvus
    app.kubernetes.io/name: milvuss.kubedb.com
    release: prometheus-stack
  name: milvus
  namespace: demo
spec:
  endpoints:
  - honorLabels: true
    interval: 30s
    path: /metrics
    port: metrics
  namespaceSelector:
    matchNames:
    - demo
  selector:
    matchLabels:
      app.kubernetes.io/instance: milvus
      app.kubernetes.io/name: milvuss.kubedb.com
---
apiVersion: kubedb.com/v1alpha2
kind: Milvus
metadata:
  name: milvus
  namespace: default
spec:
  version: "24.4.1"
  replicas: 3
  storageType: Durable
  storage:
    storageClassName: default
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  podTemplate:
    spec:
      containers:
        - name: milvus
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
      podPlacementPolicy:
        name: default
      nodeSelector:
        app: milvuss.kubedb.com
        instance: hello
        namespace: default
        nodepool: standard-bsv2-family
      tolerations:
        - key: app
          operator: "Equal"
          value: "milvuss.kubedb.com"
          effect: "NoSchedule"
        - key: instance
          operator: "Equal"
          value: hello
          effect: "NoSchedule"
        - key: namespace
          operator: "Equal"
          value: default
          effect: "NoSchedule"
        - key: nodepool
          operator: "Equal"
          value: standard-bsv2-family
          effect: "NoSchedule"
  deletionPolicy: WipeOut
  serviceTemplates:
    - alias: primary
      spec:
        type: LoadBalancer
