apiVersion: v1
kind: Secret
metadata:
  name: hazelcast-auth
  namespace: demo
stringData:
  password: thisIs1StrongPassword
  username: root
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: hazelcast-config
  namespace: demo
stringData:
  hazelcast.cnf: |
    [mysqld]
    max_connections = 200
    read_buffer_size = 1048576
type: Opaque
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: hazelcast-ca
  namespace: demo
spec:
  ca:
    secretName: hazelcast-ca
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/instance: hazelcast
    app.kubernetes.io/name: hazelcasts.kubedb.com
    release: prometheus-stack
  name: hazelcast
  namespace: demo
spec:
  endpoints:
    - honorLabels: true
      interval: 30s
      path: /metrics
      port: metrics
  namespaceSelector:
    matchNames:
      - demo
  selector:
    matchLabels:
      app.kubernetes.io/instance: hazelcast
      app.kubernetes.io/name: hazelcasts.kubedb.com
---
apiVersion: kubedb.com/v1alpha2
kind: Hazelcast
metadata:
  name: hazelcast
  namespace: hazelcast
spec:
  podTemplate:
    spec:
      nodeSelector:
        app: kubedb
        instance: hazelcast
        component: hazelcast-database
      tolerations:
        - effect: NoSchedule
          key: app
          operator: Equal
          value: kubedb
        - effect: NoSchedule
          key: instance
          operator: Equal
          value: hazelcast
        - effect: NoSchedule
          key: component
          operator: Equal
          value: hazelcast-database
        - effect: NoSchedule
          key: nodepool_type
          operator: Equal
          value: n2-standard-2
      containers:
        - name: hazelcast
          resources:
            requests:
              cpu: 700m
              memory: "1200Mi"
  version: 3.8.3
  replicas: 3
  storage:
    resources:
      requests:
        storage: "100Mi"
    #    storageClassName: standard
    accessModes:
      - ReadWriteOnce
  serviceTemplates:
    - alias: primary
      spec:
        type: LoadBalancer
  deletionPolicy: Halt
---
apiVersion: autoscaling.kubedb.com/v1alpha1
kind: HazelcastAutoscaler
metadata:
  name: hazelcast
  namespace: demo
spec:
  databaseRef:
    name: hazelcast
  opsRequestOptions:
    timeout: 10m
    apply: IfReady
  compute:
    hazelcast:
      trigger: "On"
      podLifeTimeThreshold: 10m
      resourceDiffPercentage: 20
      minAllowed:
        cpu: 400m
        memory: 400Mi
      maxAllowed:
        cpu: 1
        memory: 2Gi
    nodeTopology:
      name: standard-basv2-family
---
apiVersion: catalog.appscode.com/v1alpha1
kind: HazelcastBinding
metadata:
  name: hazelcast
  namespace: demo
spec:
  sourceRef:
    name: hazelcast
    namespace: demo
