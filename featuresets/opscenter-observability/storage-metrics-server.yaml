apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: storage-metrics-server
  namespace: kubeops
  labels:
    app.kubernetes.io/component: storage-metrics-server
spec:
  interval: 5m
  timeout: 30m
  releaseName: storage-metrics-server
  targetNamespace: monitoring
  storageNamespace: monitoring
  chart:
    spec:
      chart: storage-metrics-server
      version: "v0.1.0"
      sourceRef:
        kind: HelmRepository
        name: appscode-charts-oci
        namespace: kubeops
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
